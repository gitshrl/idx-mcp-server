name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: set up rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      # BoringSSL (via wreq, used by get_filing) builds from source at compile
      # time: needs cmake + a C/C++ toolchain, libclang for bindgen, and Go.
      - name: set up go (for boringssl build)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: install boringssl build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev

      - name: check formatting
        run: cargo fmt --check

      - name: run tests
        run: cargo test --locked

      - name: run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
